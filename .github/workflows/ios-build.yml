name: iOS Build

on:
  push:
    branches: [ main ]
    paths: [ 'CredTrack/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'CredTrack/**' ]

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Build
        working-directory: CredTrack
        run: |
          xcodebuild clean build \
            -project CredTrack.xcodeproj \
            -scheme CredTrack \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.0' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Run Tests
        working-directory: CredTrack
        run: |
          xcodebuild test \
            -project CredTrack.xcodeproj \
            -scheme CredTrack \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.0' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
