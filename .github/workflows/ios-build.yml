name: iOS Build

on:
  push:
    branches: [ main ]
    paths: [ 'CredTrack/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'CredTrack/**' ]

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          if [ -d "/Applications/Xcode_16.2.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          fi
          sudo xcodebuild -license accept || true
          xcodebuild -version

      - name: Build
        working-directory: CredTrack
        run: |
          xcodebuild clean build \
            -project CredTrack.xcodeproj \
            -scheme CredTrack \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
