spring.application.name=backend


spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/credtrack}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=8080

spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.serialization.write-dates-as-timestamps=false

firebase.storage.bucket=${FIREBASE_STORAGE_BUCKET:credtrack-a007b.firebasestorage.app}
firebase.storage.cards-folder=cards

# Internal service key (used by AI agent project to call /internal/* endpoints)
app.internal.service-key=${INTERNAL_SERVICE_KEY:changeme-dev-key}

# AI agent base URL — backend calls this to trigger immediate Gmail scans on card add
ai-agent.base-url=${AI_AGENT_BASE_URL:http://localhost:8081}

# Gmail OAuth
google.oauth.client-id=${GOOGLE_CLIENT_ID}
google.oauth.client-secret=${GOOGLE_CLIENT_SECRET}
google.oauth.redirect-uri=${GOOGLE_REDIRECT_URI:http://127.0.0.1:8080/gmail/oauth/callback}
google.oauth.state-secret=${GOOGLE_OAUTH_STATE_SECRET:changeme-state-secret}

# AES-256 key for encrypting refresh tokens (must be 32-byte base64-encoded)
app.encryption.key=${ENCRYPTION_KEY}

# Deep link after successful Gmail connect
app.deep-link.gmail-connected=credtrack://gmail/connected