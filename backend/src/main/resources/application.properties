spring.application.name=backend


spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/credtrack}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=8080

spring.jackson.property-naming-strategy=SNAKE_CASE

firebase.storage.bucket=${FIREBASE_STORAGE_BUCKET:credtrack-a007b.firebasestorage.app}
firebase.storage.cards-folder=cards

# Internal service key (used by AI agent project to call /internal/* endpoints)
app.internal.service-key=${INTERNAL_SERVICE_KEY:changeme-dev-key}